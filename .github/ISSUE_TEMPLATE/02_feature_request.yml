name: Feature Request
description: Suggest an idea for Nexy
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an idea. Please explain the problem you're trying to solve and how you envision the solution.

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem would this feature solve? What use case does it address?
      placeholder: "Example: I want to use Nexy with a MySQL database, but there's no built-in support."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe the feature you'd like. Be as specific as possible.
      placeholder: "Example: Add a MySQL connector module that supports async queries."
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternative solutions
      description: Describe any alternatives you've considered.
      placeholder: "I've tried using raw SQLAlchemy but it doesn't integrate with Nexy's DI system."

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add any other context, screenshots, or examples about the feature request here.

  - type: checkboxes
    id: checks
    attributes:
      label: Validation
      options:
        - label: I have searched existing issues and this is not a duplicate.
          required: true
        - label: I would be willing to help implement this feature.
          required: false
